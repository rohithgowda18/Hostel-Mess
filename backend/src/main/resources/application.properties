# Application Configuration
spring.application.name=mess-breakfast

# Server Port (Render provides PORT env variable)
server.port=${PORT:8080}

# MongoDB Configuration (Use env variable for production, fallback to localhost for dev)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/hostel_mess}
spring.data.mongodb.database=hostel_mess

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.hostel.mess=DEBUG
